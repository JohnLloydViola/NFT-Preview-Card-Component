<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <link rel="icon" type="image/png" href="images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <main class="container">
    <div class="content">

      <div class="image-container">
        <img class="main-image" src="images/image-equilibrium.jpg" alt="Equilibrium Image">
        <img class="view-icon" src="images/icon-view.svg" alt="View Icon">

      </div>
      
      

      <div class="description">
        <h1 class="title main-title">Equilibrium #3429</h1>
        <p>Our equilibrium collection promotes balance and calm</p>
      </div>
      
      <div class="eth-currency">
        <p class="eth"> <img src="images/icon-ethereum.svg" alt="Ethereum Icon">0.0041 ETH</p>
        <p class="time"><img src="images/icon-clock.svg" alt="Clock Icon">3 days left</p>
      </div>

    </div>
      <hr>


    <div class="creator">
      <img src="images/image-avatar.jpg" alt="Avatar Image">
      <p>Creation of <span class="title">John Lloyd Viola</span></p>
    </div>




  </main>



  
</body>
</html>
